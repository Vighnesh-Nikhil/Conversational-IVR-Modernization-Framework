<!DOCTYPE html>
<html>
<head>
<title>CityCare IVR</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1e293b, #020617);
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* PHONE FRAME */
.phone {
    position: relative;
    width: 400px;
    height: 750px;
    background: #000;
    border-radius: 40px;
    padding: 15px;
    border: 5px solid #1f2937;
    box-shadow: 0 0 60px rgba(59,130,246,0.2), 0 0 20px rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    outline: 1px solid rgba(59,130,246,0.2);
    transition: transform 0.3s;
}

.phone:hover {
    transform: translateY(-5px);
}

/* STATUS BAR */
.status-bar {
    display: flex;
    justify-content: space-between;
    color: white;
    font-size: 14px;
}

.island {
    width: 110px;
    height: 25px;
    background: #111;
    border-radius: 20px;
    margin: 0 auto;
}

/* PROFILE */
.profile {
    text-align: center;
    margin: 10px 0;
}

.avatar {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #22c55e, #3b82f6);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 20px;
    margin: auto;
}

.name {
    color: white;
}

/* CHAT */
.chat {
    flex: 1;
    overflow-y: auto;
}

.msg {
    padding: 12px;
    margin: 8px;
    border-radius: 14px;
    max-width: 80%;
    line-height: 1.4;
}

.user {
    background: #22c55e;
    color: white;
    margin-left: auto;
}

.bot {
    background: #3b82f6;
    color: white;
}

/* INPUT */
.input-box {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: none;
}

/* BUTTONS */
.btn {
    padding: 8px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.send {
    background: #2563eb;
    color: white;
}

.voice {
    background: #22c55e;
    color: white;
}

/* DIAL PAD */
.dialpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
}

.key {
    background: #1f2937;
    color: white;
    font-size: 18px;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
}

/* ACTION BUTTONS */
.actions {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
}

.call-btn {
    background: #22c55e;
    color: white;
    padding: 10px;
    border-radius: 20px;
}

.key:active {
    transform: scale(0.92);
    background: #374151;
}

/* SIDE BUTTONS */

/* LEFT - VOLUME */
.volume-buttons {
    position: absolute;
    left: -6px;
    top: 150px;
    width: 4px;
    height: 80px;
    background: #374151;
    border-radius: 2px;
}

/* RIGHT - POWER */
.power-button {
    position: absolute;
    right: -6px;
    top: 180px;
    width: 4px;
    height: 60px;
    background: #374151;
    border-radius: 2px;
}

.end-btn {
    background: #ef4444;
    color: white;
    padding: 10px;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="phone">
<div class="volume-buttons"></div>
<div class="power-button"></div>

<div class="status-bar">
    <span id="time">12:00</span>
    <div class="island"></div>
    <span> 100%</span>
</div>

<div class="profile">
    <div class="avatar">U</div>
    <div class="name">User</div>
    <div id="timer" style="color:#22c55e; font-size:14px;">00:00</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-box">
    <input id="userInput" placeholder="Type or speak..." />
    <button class="btn send" onclick="sendMessage()">Send</button>
    <button class="btn voice" onclick="startVoice()">Speak</button>
</div>

<div class="dialpad">
    <div class="key" onclick="sendDigit('1')">1</div>
    <div class="key" onclick="sendDigit('2')">2</div>
    <div class="key" onclick="sendDigit('3')">3</div>
    <div class="key" onclick="sendDigit('4')">4</div>
    <div class="key" onclick="sendDigit('5')">5</div>
    <div class="key" onclick="sendDigit('6')">6</div>
    <div class="key" onclick="sendDigit('7')">7</div>
    <div class="key" onclick="sendDigit('8')">8</div>
    <div class="key" onclick="sendDigit('9')">9</div>
    <div class="key">*</div>
    <div class="key" onclick="sendDigit('0')">0</div>
    <div class="key">#</div>
</div>

<div class="actions">
    <button class="call-btn" onclick="startCall()">Call</button>
    <button class="end-btn" onclick="endCall()">End</button>
</div>

</div>

<script>
const API_URL = "https://conversational-ivr-modernization-pcpz.onrender.com";
let session_id = "";

/* TIME */
setInterval(() => {
    const now = new Date();
    document.getElementById("time").innerText =
        now.getHours().toString().padStart(2, '0') + ":" +
        now.getMinutes().toString().padStart(2, '0');
}, 1000);


function startCall() {

    if (session_id !== "") {
        addMessage("bot", "Call already active.");
        return;
    }

    document.getElementById("chat").innerHTML = "";

    startSession();
}

/* START SESSION */
async function startSession() {
    const res = await fetch(API_URL + "/start-call", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({caller_name: "User"})
    });

    const data = await res.json();
    session_id = data.session_id;

    addMessage("bot", data.message);
    speakText(data.message);
}

/* MESSAGE */
function addMessage(type, text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* SEND TEXT */
async function sendMessage() {
    const text = document.getElementById("userInput").value;
    addMessage("user", text);
    showTyping();

    const res = await fetch(API_URL + "/converse?session_id=" + session_id + "&user_text=" + encodeURIComponent(text), {
        method: "POST"
    });

    const data = await res.json();
    removeTyping();
    addMessage("bot", data.message);
    speakText(data.message);
    document.getElementById("userInput").value = "";
}

/* SEND DIGIT */
async function sendDigit(digit) {
    function playBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(800, ctx.currentTime);
    oscillator.connect(ctx.destination);
    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.1);
    }
    addMessage("user", digit);
    showTyping();

    const res = await fetch(API_URL + "/converse?session_id=" + session_id + "&user_text=" + digit, {
        method: "POST"
    });

    const data = await res.json();
    removeTyping();
    addMessage("bot", data.message);
    speakText(data.message);
}

/* VOICE */
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.start();

    recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;
        document.getElementById("userInput").value = text;
        sendMessage();
    };
}

/* SPEECH */
function speakText(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}
let seconds = 0;

function showTyping() {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg bot";
    div.id = "typing";
    div.innerText = "Typing...";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

function startTimer() {
    setInterval(() => {
        seconds++;

        const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
        const secs = String(seconds % 60).padStart(2, '0');

        document.getElementById("timer").innerText = mins + ":" + secs;
    }, 1000);
}

function endCall() {

    // STOP any ongoing voice immediately
    window.speechSynthesis.cancel();

    // Clear session
    session_id = "";

    // Show message
    addMessage("bot", "Call ended.");

}

function playBeep() {
    const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();
}

window.onload = () => {
    
    startTimer();
};
</script>

</body>
</html>
